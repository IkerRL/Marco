<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Frame | MakacaGotica</title>
    <!-- Usa la misma fuente y hoja de estilos -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="camera-body">

    <!-- Contenedor principal del marco de la cámara -->
    <div class="camera-frame">
        
        <!-- Esquinas decorativas en los 4 lados -->
        <div class="camera-corner top-left"></div>
        <div class="camera-corner top-right"></div>
        <div class="camera-corner bottom-left"></div>
        <div class="camera-corner bottom-right"></div>
        
        <!-- Rectángulo superior con el logo y el nombre de la marca -->
        <div class="camera-brand">
            <img src="horus x falcon head_white.png" alt="Horus X Logo">
            <span class="brand-name">HORUS X</span>
        </div>
        
    </div>

</body>
</html>
